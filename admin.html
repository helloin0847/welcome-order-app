<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#8f1723">
  <title>麻雀WELCOME 発注管理</title>
  <link rel="stylesheet" href="styles.css?v=20260723-5">
  <link rel="stylesheet" href="admin.css?v=20260723-1">
</head>
<body class="admin-body">
  <header class="site-header">
    <div class="header-inner admin-header">
      <div class="brand-mark"><img src="assets/gorilla-panda-bow.png" alt="WELCOMEキャラクター" width="72" height="66"></div>
      <div><p class="eyebrow">麻雀 WELCOME｜本部用</p><h1>名札・サービス券 発注管理</h1></div>
      <a class="header-link" href="index.html">店舗用フォーム</a>
    </div>
  </header>

  <main class="admin-main">
    <section id="loginPanel" class="panel login-panel">
      <h2>管理画面にログイン</h2>
      <p class="muted">本部用の管理PINを入力してください。</p>
      <form id="loginForm" class="pin-form">
        <input id="adminPin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="管理PIN" required>
        <button class="submit-button" type="submit">管理画面を開く</button>
      </form>
      <p id="loginStatus" class="status" aria-live="polite"></p>
    </section>

    <div id="dashboard" hidden>
      <section class="summary-grid" aria-label="発注件数">
        <article><span>未手配</span><strong id="newCount">0</strong></article>
        <article><span>手配中</span><strong id="workingCount">0</strong></article>
        <article class="complete"><span>完了</span><strong id="completeCount">0</strong></article>
      </section>

      <section class="panel toolbar-panel">
        <div class="toolbar">
          <div class="field"><label for="storeFilter">店舗</label><select id="storeFilter"><option value="">すべての店舗</option><option>千葉店</option><option>新小岩店</option><option>大宮店</option><option>日暮里店</option><option>靖国通り店</option><option>三宮店</option><option>歌舞伎町店</option><option>水道橋店</option></select></div>
          <div class="field"><label for="statusFilter">状況</label><select id="statusFilter"><option value="">すべて</option><option value="未手配">未手配</option><option value="手配中">手配中</option><option value="完了">完了</option></select></div>
          <button id="refreshButton" class="secondary-button" type="button">今すぐ更新</button>
          <div class="auto-update"><span class="live-dot"></span><span>30秒ごとに自動更新</span></div>
        </div>
        <p id="lastUpdated" class="muted update-time"></p>
      </section>

      <section class="panel orders-panel">
        <div class="orders-heading"><h2>発注一覧</h2><span id="visibleCount" class="count-badge">0件</span></div>
        <p id="ordersStatus" class="muted" aria-live="polite"></p>
        <div id="ordersList" class="admin-orders"></div>
      </section>
    </div>
  </main>
  <script src="supabase.js?v=20260723-2"></script>
  <script src="admin.js?v=20260723-1"></script>
</body>
</html>
